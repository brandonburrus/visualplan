name: Deploy docs

# Build the visualplan.dev docs site (packages/app) and deploy it to GitHub Pages.
# Runs when a release is published (so the docs track published CLI releases) and on
# demand via the Actions tab. The custom apex domain is preserved by public/CNAME,
# which Astro copies into the build output.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight Pages deploy at a time; do not cancel a running publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile

      # The app build renders the example plans with the vplan CLI, so build it first.
      - name: Build the vplan CLI
        run: pnpm --filter vplan build

      - name: Build the docs site
        run: pnpm --filter @visualplan/app build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
