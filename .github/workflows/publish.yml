name: Publish

# Publish the vplan CLI to npm when a GitHub release is published. The package
# version is taken from the release tag (e.g. tag "0.2.0" -> version 0.2.0), set
# at build time only; the repo's package.json version is not committed back.
#
# Auth is npm trusted publishing (OIDC): no NPM_TOKEN. It requires the `id-token:
# write` permission below and a trusted publisher configured for `vplan` on npmjs.com
# pointing at this workflow. pnpm exchanges the GitHub OIDC token for a short-lived
# npm credential at publish time.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # pnpm publish shells out to npm for the upload, and OIDC trusted publishing
      # requires npm >= 11.5.1 (the runner ships npm 10.x). Node 22 already satisfies
      # the >= 22.14.0 requirement.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      # Gate the release on a green build before anything is published.
      - run: pnpm -r typecheck
      - run: pnpm test

      - name: Set version from the release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "Publishing vplan@$VERSION (from tag $TAG)"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        working-directory: packages/cli

      # pnpm pack runs prepack (vendors runtime + core, runs tsup) and rewrites the
      # workspace protocol into the tarball's manifest. We then publish the tarball
      # with npm directly: npm performs the OIDC trusted-publishing handshake, whereas
      # pnpm publish shells out to npm in a way that bypasses OIDC (ENEEDAUTH).
      - name: Pack the publishable tarball
        run: pnpm pack --pack-destination "$RUNNER_TEMP"
        working-directory: packages/cli

      - name: Publish to npm (OIDC trusted publishing)
        run: npm publish "$RUNNER_TEMP"/vplan-*.tgz --access public
