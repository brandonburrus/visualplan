name: Publish

# Publish the vplan CLI to npm when a GitHub release is published, using npm
# trusted publishing (OIDC) - no NPM_TOKEN. Requires id-token: write, npm >= 11.5.1,
# and a trusted publisher configured for vplan on npm pointing at this workflow.
# The published version comes from the release tag (e.g. tag "0.2.0" -> 0.2.0).
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1; the runner ships npm 10.x.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm test

      - name: Set version from the tag and drop workspace-only devDeps
        working-directory: packages/cli
        run: |
          npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
          npm pkg delete devDependencies

      # npm publish runs prepack (vendors runtime + core, runs tsup) and performs the
      # OIDC handshake. The @visualplan/* devDeps were workspace:* (npm can't resolve
      # them) and are dev-only, so they were dropped above.
      - name: Publish to npm
        working-directory: packages/cli
        run: npm publish --access public
