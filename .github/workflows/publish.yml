name: Publish

# Publish the vplan CLI to npm when a GitHub release is published. The package
# version is taken from the release tag (e.g. tag "0.2.0" -> version 0.2.0), set
# at build time only; the repo's package.json version is not committed back.
#
# Auth is npm trusted publishing (OIDC): no NPM_TOKEN. It requires the `id-token:
# write` permission below, npm CLI >= 11.5.1, Node >= 22.14.0, and a trusted
# publisher configured for `vplan` on npmjs.com pointing at this workflow.
#
# workflow_dispatch runs only the setup + diagnostics steps (no publish) so the
# publish environment can be inspected without cutting a release.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # OIDC trusted publishing requires npm >= 11.5.1 (the runner ships npm 10.x).
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Diagnostics
        run: |
          echo "node: $(node --version)"
          echo "npm:  $(npm --version)"
          echo "pnpm: $(pnpm --version)"
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then echo "OIDC request URL: present"; else echo "OIDC request URL: MISSING"; fi
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ]; then echo "OIDC request token: present"; else echo "OIDC request token: MISSING"; fi
          echo "registry: $(npm config get registry)"
          echo "--- ~/.npmrc ---"
          cat ~/.npmrc 2>/dev/null || echo "(none)"

      # Gate the release on a green build before anything is published.
      - run: pnpm -r typecheck
        if: github.event_name == 'release'
      - run: pnpm test
        if: github.event_name == 'release'

      - name: Set version from the release tag
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "Publishing vplan@$VERSION (from tag $TAG)"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        working-directory: packages/cli

      # pnpm pack runs prepack (vendors runtime + core, runs tsup) and rewrites the
      # workspace protocol into the tarball's manifest. We publish the tarball with
      # npm directly, which performs the OIDC trusted-publishing handshake.
      - name: Pack the publishable tarball
        if: github.event_name == 'release'
        run: pnpm pack --pack-destination "$RUNNER_TEMP"
        working-directory: packages/cli

      - name: Publish to npm (OIDC trusted publishing)
        if: github.event_name == 'release'
        run: npm publish "$RUNNER_TEMP"/vplan-*.tgz --access public
